<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS Password Vault</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#020617;
    color:#00ffff;
    min-height:100vh;
}

.top-bar{
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    border-bottom:1px solid cyan;
    box-shadow:0 0 15px cyan;
}

.back-btn{
    padding:10px 20px;
    background:transparent;
    border:1px solid cyan;
    color:cyan;
    cursor:pointer;
    border-radius:10px;
}

.back-btn:hover{
    box-shadow:0 0 15px cyan;
}

.container{
    padding:25px;
}

.form-card{
    border:1px solid cyan;
    border-radius:15px;
    padding:20px;
    margin-bottom:30px;
    box-shadow:0 0 15px rgba(0,255,255,.4);
}

.form-card h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#000;
    color:white;
    border:1px solid cyan;
    border-radius:8px;
}

.save-btn{
    padding:12px 20px;
    background:transparent;
    color:cyan;
    border:1px solid cyan;
    cursor:pointer;
    border-radius:8px;
}

.save-btn:hover{
    box-shadow:0 0 15px cyan;
}

.password-list{
    display:grid;
    gap:15px;
}

.password-card{
    border:1px solid cyan;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 15px rgba(0,255,255,.3);
}

.password-card h3{
    margin-bottom:10px;
}

.actions{
    margin-top:10px;
    display:flex;
    gap:10px;
}

.actions button{
    padding:8px 15px;
    cursor:pointer;
    background:transparent;
    border:1px solid cyan;
    color:cyan;
    border-radius:8px;
}

.actions button:hover{
    box-shadow:0 0 10px cyan;
}

</style>

</head>

<body>

<div class="top-bar">

    <h1>🔐 JARVIS PASSWORD VAULT</h1>

    <button
    class="back-btn"
    onclick="goBack()">

    DASHBOARD

    </button>

</div>

<div class="container">

    <div class="form-card">

        <h2>SAVE PASSWORD</h2>

        <input
        type="text"
        id="site"
        placeholder="Website Name">

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button
        class="save-btn"
        onclick="savePassword()">

        SAVE PASSWORD

        </button>

    </div>

    <div
    id="passwordList"
    class="password-list">

    </div>

</div>

<script>

function speak(text){

    speechSynthesis.speak(
        new SpeechSynthesisUtterance(text)
    );

}

speak("Opening Password Vault");

function goBack(){

    window.location.href =
    "index.html";

}

async function savePassword(){

    const site =
    document.getElementById("site").value;

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    if(
        !site ||
        !username ||
        !password
    ){

        alert(
            "Fill all fields"
        );

        return;

    }

    const response =
    await fetch(
        "http://localhost:3000/passwords",
        {
            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                site,
                username,
                password

            })

        }
    );

    const data =
    await response.json();

    if(data.success){

        speak(
            "Password Saved Successfully"
        );

        document.getElementById("site").value="";
        document.getElementById("username").value="";
        document.getElementById("password").value="";

        loadPasswords();

    }

}

async function loadPasswords(){

    const response =
    await fetch(
        "http://localhost:3000/passwords"
    );

    const passwords =
    await response.json();

    const list =
    document.getElementById(
        "passwordList"
    );

    list.innerHTML = "";

    passwords.forEach(item=>{

        list.innerHTML += `

        <div class="password-card">

            <h3>${item.site}</h3>

            <p>
            Username:
            ${item.username}
            </p>

            <p id="pass-${item.id}">
            Password:
            ********
            </p>

            <div class="actions">

                <button
                onclick="showPassword(
                '${item.id}',
                '${item.password}'
                )">

                Show

                </button>

                <button
                onclick="copyPassword(
                '${item.password}'
                )">

                Copy

                </button>

            </div>

        </div>

        `;

    });

}

function showPassword(id,password){

    document.getElementById(
        `pass-${id}`
    ).innerHTML =

    `Password: ${password}`;

}

function copyPassword(password){

    navigator.clipboard.writeText(
        password
    );

    speak(
        "Password Copied"
    );

    alert(
        "Password Copied"
    );

}

loadPasswords();

</script>

</body>

</html>
